<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atacarejo Vitória – Oferta da Feira</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c1:#0e4d0e;--c2:#1a6b1a;--c3:#2a9d2a;
    --bg:#f0f7f0;--accent:#f5c300;
    --ph1:#d4edda;--ph2:#c3e6cb;--hero-text:#0e4d0e;--sec:#1a6b1a;
    --white:#fff;--yellow:#f5c300;--shadow:0 4px 20px rgba(0,0,0,.10);
  }
  body[data-theme="hortifruti"]{--c1:#0e4d0e;--c2:#1a6b1a;--c3:#2a9d2a;--bg:#f0f7f0;--ph1:#d4edda;--ph2:#c3e6cb;--hero-text:#0e4d0e;--sec:#1a6b1a;}
  body[data-theme="carnes"]    {--c1:#6b0e0e;--c2:#9d1a1a;--c3:#c93030;--bg:#fff0f0;--ph1:#ffd6d6;--ph2:#ffbcbc;--hero-text:#6b0e0e;--sec:#9d1a1a;}
  body[data-theme="limpeza"]   {--c1:#0e2a6b;--c2:#1a4a9d;--c3:#2266c9;--bg:#f0f4ff;--ph1:#d6e4ff;--ph2:#bdd3ff;--hero-text:#0e2a6b;--sec:#1a4a9d;}
  body[data-theme="laticinios"]{--c1:#5c4a00;--c2:#8a6f00;--c3:#c9a200;--bg:#fffcf0;--ph1:#fff3cc;--ph2:#ffe99a;--hero-text:#5c4a00;--sec:#8a6f00;}
  body[data-theme="bebidas"]   {--c1:#3b0e6b;--c2:#5a1a9d;--c3:#7a2ec9;--bg:#f5f0ff;--ph1:#e4d6ff;--ph2:#d2bcff;--hero-text:#3b0e6b;--sec:#5a1a9d;}
  body[data-theme="padaria"]   {--c1:#5c2a00;--c2:#8a4500;--c3:#c96800;--bg:#fff6f0;--ph1:#ffe0cc;--ph2:#ffc9a8;--hero-text:#5c2a00;--sec:#8a4500;}
  body[data-theme="higiene"]   {--c1:#6b0e45;--c2:#9d1a66;--c3:#c9308a;--bg:#fff0f7;--ph1:#ffd6ee;--ph2:#ffbce3;--hero-text:#6b0e45;--sec:#9d1a66;}
  body[data-theme="geral"]     {--c1:#2a2a2a;--c2:#444;--c3:#666;--bg:#f4f4f4;--ph1:#e0e0e0;--ph2:#ccc;--hero-text:#2a2a2a;--sec:#444;}

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:#1a1a1a;min-height:100vh;transition:background .5s}

  header{background:linear-gradient(135deg,var(--c1) 0%,var(--c2) 40%,var(--c3) 100%);position:relative;overflow:hidden;transition:background .5s}
  header::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 70% 50%,rgba(245,195,0,.18) 0%,transparent 65%),radial-gradient(circle at 15% 80%,rgba(255,255,255,.12) 0%,transparent 50%)}
  .header-inner{position:relative;max-width:980px;margin:0 auto;padding:24px 20px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px}
  .logo-eyebrow{font-weight:700;font-size:.72rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.75)}
  .logo-name{font-family:'Bebas Neue',cursive;font-size:clamp(2.2rem,6vw,3.6rem);color:#fff;line-height:1;text-shadow:3px 3px 0 rgba(0,0,0,.3)}
  .logo-name span{color:var(--yellow)}
  .logo-tagline{font-size:.75rem;color:rgba(255,255,255,.70);font-style:italic}
  .badge-date{background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.30);border-radius:12px;padding:10px 16px;text-align:center;backdrop-filter:blur(6px)}
  .badge-date .label{font-size:.68rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,.70)}
  .badge-date .dates{font-family:'Bebas Neue',cursive;font-size:1.25rem;color:var(--yellow);line-height:1.1}

  .category-bar{background:var(--c1);border-bottom:3px solid var(--accent);overflow-x:auto;scrollbar-width:none;transition:background .5s}
  .category-bar::-webkit-scrollbar{display:none}
  .category-tabs{display:flex;max-width:980px;margin:0 auto;padding:0 10px;gap:2px;white-space:nowrap}
  .cat-tab{display:inline-flex;align-items:center;gap:6px;padding:11px 16px;border:none;background:transparent;color:rgba(255,255,255,.60);font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all .2s;white-space:nowrap}
  .cat-tab:hover{color:rgba(255,255,255,.90);background:rgba(255,255,255,.07);border-radius:8px 8px 0 0}
  .cat-tab.active{color:var(--yellow);border-bottom-color:var(--yellow)}
  .cat-tab .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

  .hero-strip{background:var(--accent);text-align:center;padding:9px 16px;font-family:'Bebas Neue',cursive;font-size:clamp(1.2rem,3.5vw,1.8rem);color:var(--hero-text);letter-spacing:3px;transition:background .5s,color .5s}

  main{max-width:980px;margin:0 auto;padding:28px 16px 100px}
  .section-title{display:flex;align-items:center;gap:10px;margin-bottom:20px}
  .section-title h2{font-family:'Bebas Neue',cursive;font-size:1.9rem;color:var(--sec);letter-spacing:2px;transition:color .4s;white-space:nowrap}
  .section-title .line{flex:1;height:3px;background:linear-gradient(90deg,var(--c3),transparent);border-radius:3px;transition:background .5s}

  .filter-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .filter-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:50px;border:2px solid transparent;font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;cursor:pointer;transition:all .2s;color:#fff}
  .filter-pill.inactive{opacity:.4;filter:grayscale(.4)}
  .filter-pill.all-pill{background:#1a1a1a!important}

  .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px}
  .product-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);transition:transform .25s,box-shadow .25s;position:relative;display:flex;flex-direction:column}
  .product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.14)}
  .card-img{width:100%;aspect-ratio:1/1;object-fit:cover}
  .card-img-placeholder{width:100%;aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:3.2rem;transition:background .5s}
  .card-body{padding:11px 13px 13px;flex:1;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:background .4s}
  .card-name{font-size:.85rem;font-weight:800;color:#fff;line-height:1.2;flex:1}
  .card-price{display:flex;align-items:flex-start;gap:1px;white-space:nowrap}
  .price-main{font-family:'Bebas Neue',cursive;font-size:2rem;color:#fff;line-height:1}
  .price-cents-unit{display:flex;flex-direction:column;align-items:flex-start;padding-top:3px}
  .price-cents{font-family:'Bebas Neue',cursive;font-size:1rem;color:var(--yellow);line-height:1}
  .price-unit{font-size:.6rem;color:rgba(255,255,255,.75);font-weight:700;line-height:1.2;text-transform:lowercase}

  .btn-add-cart{width:100%;border:none;cursor:pointer;padding:10px 12px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;background:rgba(0,0,0,.18);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;letter-spacing:.3px}
  .btn-add-cart:hover{background:rgba(0,0,0,.32)}
  .qty-controls{width:100%;display:none;align-items:center;justify-content:space-between;background:rgba(0,0,0,.22);padding:6px 12px;gap:8px}
  .qty-controls.visible{display:flex}
  .qty-btn{background:rgba(255,255,255,.25);border:none;color:#fff;width:28px;height:28px;border-radius:50%;font-size:1.1rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
  .qty-btn:hover{background:rgba(255,255,255,.40)}
  .qty-display{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#fff;flex:1;text-align:center}
  .qty-label{font-size:.65rem;color:rgba(255,255,255,.75);font-weight:700}

  .cat-badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.55);color:#fff;font-size:.62rem;font-weight:800;padding:3px 7px;border-radius:20px;letter-spacing:.5px;backdrop-filter:blur(4px)}
  .card-actions{position:absolute;top:8px;right:8px;display:none;gap:5px}
  body.admin-mode .card-actions{display:flex}
  .btn-icon{width:30px;height:30px;border-radius:50%;border:none;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .btn-icon:hover{transform:scale(1.15)}
  .btn-edit{background:#f5c300;color:#1a2e1a}
  .btn-delete{background:#e63946;color:#fff}

  /* SYNC STATUS */
  .sync-bar{background:rgba(0,0,0,.06);text-align:center;padding:6px;font-size:.72rem;color:#888;display:flex;align-items:center;justify-content:center;gap:6px}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
  .sync-dot.online{background:#25d366}
  .sync-dot.offline{background:#e63946}
  .sync-dot.syncing{background:#f5c300;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  #cart-fab{position:fixed;bottom:24px;left:24px;background:#25d366;color:#fff;border:none;border-radius:50px;padding:13px 20px;font-family:'Nunito',sans-serif;font-weight:900;font-size:.9rem;cursor:pointer;box-shadow:0 4px 24px rgba(37,211,102,.5);display:none;align-items:center;gap:10px;z-index:1000;transition:transform .2s,box-shadow .2s}
  #cart-fab:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(37,211,102,.6)}
  #cart-fab .fab-count{background:#fff;color:#25d366;border-radius:50%;width:24px;height:24px;font-size:.78rem;font-weight:900;display:flex;align-items:center;justify-content:center}

  #cart-overlay{display:none;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
  #cart-overlay.open{display:block}
  #cart-drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;max-height:88vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2);transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
  #cart-overlay.open #cart-drawer{transform:translateY(0)}
  .drawer-handle{width:40px;height:4px;background:#e0e0e0;border-radius:4px;margin:14px auto 0}
  .drawer-header{padding:16px 22px 14px;border-bottom:2px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}
  .drawer-header h3{font-family:'Bebas Neue',cursive;font-size:1.6rem;color:#1a1a1a;letter-spacing:1px}
  .drawer-close{background:#f3f4f6;border:none;border-radius:50%;width:34px;height:34px;font-size:1rem;cursor:pointer;color:#555;display:flex;align-items:center;justify-content:center}
  .drawer-close:hover{background:#e5e7eb}
  .drawer-name-row{padding:14px 22px 10px;border-bottom:2px solid #f0f0f0}
  .drawer-name-row label{display:block;font-size:.75rem;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
  .drawer-name-row input{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.95rem;outline:none;transition:border-color .2s}
  .drawer-name-row input:focus{border-color:#25d366}
  .drawer-items{flex:1;overflow-y:auto;padding:10px 22px}
  .drawer-empty{text-align:center;padding:40px 20px;color:#bbb}
  .drawer-empty .icon{font-size:3rem;margin-bottom:10px}
  .cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f0f0f0}
  .cart-item:last-child{border-bottom:none}
  .ci-emoji{font-size:2rem;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px}
  .ci-info{flex:1}
  .ci-name{font-weight:800;font-size:.88rem;color:#1a1a1a;line-height:1.2}
  .ci-price{font-size:.78rem;color:#888;margin-top:2px}
  .ci-controls{display:flex;align-items:center;gap:8px}
  .ci-qty-btn{width:30px;height:30px;border-radius:50%;border:2px solid #e5e7eb;background:#fff;font-size:1rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#444;transition:all .15s}
  .ci-qty-btn:hover{border-color:#25d366;color:#25d366}
  .ci-qty{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#1a1a1a;min-width:24px;text-align:center}
  .ci-subtotal{font-family:'Bebas Neue',cursive;font-size:1.1rem;color:#1a1a1a;min-width:64px;text-align:right}
  .ci-remove{background:none;border:none;color:#ddd;cursor:pointer;font-size:1.1rem;padding:4px;transition:color .15s}
  .ci-remove:hover{color:#e63946}
  .drawer-footer{padding:16px 22px 24px;border-top:2px solid #f0f0f0;background:#fff}
  .total-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .total-label{font-weight:800;font-size:.9rem;color:#666}
  .total-value{font-family:'Bebas Neue',cursive;font-size:2rem;color:#1a1a1a}
  .total-obs{font-size:.7rem;color:#aaa;margin-top:-10px;margin-bottom:10px;display:block}
  .btn-wa{width:100%;background:#25d366;color:#fff;border:none;border-radius:14px;padding:15px;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 4px 18px rgba(37,211,102,.4);transition:opacity .2s,transform .2s}
  .btn-wa:hover{opacity:.92;transform:translateY(-2px)}
  .btn-wa svg{width:22px;height:22px;fill:#fff}
  .btn-clear-cart{width:100%;margin-top:8px;background:none;border:none;color:#aaa;font-family:'Nunito',sans-serif;font-weight:700;font-size:.82rem;cursor:pointer;padding:6px;transition:color .2s}
  .btn-clear-cart:hover{color:#e63946}

  .cta-section{margin-top:44px;background:linear-gradient(135deg,var(--c1),var(--c3));border-radius:20px;padding:28px 22px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:18px;box-shadow:var(--shadow);transition:background .5s}
  .cta-text h3{font-family:'Bebas Neue',cursive;font-size:1.7rem;color:#fff;letter-spacing:1px}
  .cta-text p{color:rgba(255,255,255,.80);font-size:.88rem;margin-top:4px}
  .cta-text .parcela{margin-top:10px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;padding:7px 13px;font-size:.78rem;color:rgba(255,255,255,.85);font-weight:700;display:inline-block}
  .cta-wa{display:flex;align-items:center;gap:12px;background:#25d366;color:#fff;font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:1px;text-decoration:none;padding:13px 24px;border-radius:50px;box-shadow:0 4px 20px rgba(37,211,102,.45);transition:transform .2s,box-shadow .2s}
  .cta-wa:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(37,211,102,.55)}
  .cta-wa svg{width:28px;height:28px;fill:#fff}

  #admin-toggle{position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;border:none;border-radius:50px;padding:12px 18px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.30);display:flex;align-items:center;gap:7px;transition:background .2s;z-index:1000}
  #admin-toggle:hover{background:#333}

  #admin-panel{display:none;position:fixed;inset:0;z-index:4000;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);align-items:center;justify-content:center}
  #admin-panel.open{display:flex}
  .panel-box{background:#fff;border-radius:20px;width:min(580px,96vw);max-height:90vh;overflow-y:auto;padding:30px;box-shadow:0 20px 60px rgba(0,0,0,.30);position:relative}
  .panel-box h2{font-family:'Bebas Neue',cursive;font-size:1.7rem;color:var(--c2);margin-bottom:18px;letter-spacing:1px}
  .panel-close{position:absolute;top:14px;right:14px;background:#f3f4f6;border:none;border-radius:50%;width:32px;height:32px;font-size:.95rem;cursor:pointer;color:#555;display:flex;align-items:center;justify-content:center}
  .panel-close:hover{background:#e5e7eb}
  .form-group{margin-bottom:14px}
  .form-group label{display:block;font-weight:700;font-size:.78rem;color:#666;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
  .form-group input,.form-group select{width:100%;padding:9px 13px;border:2px solid #e5e7eb;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
  .form-group input:focus,.form-group select:focus{border-color:var(--c3)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .cat-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:4px}
  .cat-swatch{border:3px solid transparent;border-radius:10px;padding:7px 5px 5px;cursor:pointer;text-align:center;font-size:.66rem;font-weight:800;color:#fff;transition:transform .15s,border-color .15s;line-height:1.3;text-shadow:0 1px 3px rgba(0,0,0,.4)}
  .cat-swatch:hover{transform:scale(1.06)}
  .cat-swatch.selected{border-color:#fff;box-shadow:0 0 0 3px rgba(0,0,0,.22);transform:scale(1.06)}
  .cat-swatch .se{font-size:1.2rem;display:block;margin-bottom:2px}
  .btn-primary{width:100%;background:linear-gradient(135deg,var(--c1),var(--c3));color:#fff;border:none;border-radius:12px;padding:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:5px;transition:opacity .2s}
  .btn-primary:hover{opacity:.9}
  .panel-divider{border:none;border-top:2px solid #f0f0f0;margin:20px 0}
  .mini-list{display:flex;flex-direction:column;gap:7px}
  .mini-item{display:flex;align-items:center;justify-content:space-between;background:#f9fafb;border-radius:10px;padding:9px 13px;font-size:.85rem;font-weight:700;border-left:4px solid #ddd}
  .mini-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
  .price-tag{background:#555;color:#fff;padding:2px 8px;border-radius:6px;font-size:.72rem}
  .cat-pill{padding:2px 7px;border-radius:6px;font-size:.65rem;font-weight:800;color:#fff}
  .mini-btn{background:none;border:none;cursor:pointer;font-size:.88rem;padding:2px 5px;border-radius:6px}
  .mini-btn:hover{background:#e5e7eb}

  #pw-overlay{display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,.60);backdrop-filter:blur(6px);align-items:center;justify-content:center}
  #pw-overlay.open{display:flex}
  .pw-box{background:#fff;border-radius:20px;padding:34px;width:min(360px,92vw);text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.30)}
  .pw-box h3{font-family:'Bebas Neue',cursive;font-size:1.5rem;color:var(--c2);margin-bottom:7px}
  .pw-box p{color:#666;font-size:.86rem;margin-bottom:18px}
  .pw-box input{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-family:'Nunito',sans-serif;font-size:1rem;text-align:center;letter-spacing:4px;outline:none;margin-bottom:12px}
  .pw-box input:focus{border-color:var(--c3)}
  .pw-error{color:#e63946;font-size:.8rem;margin-top:-6px;margin-bottom:10px;display:none}

  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:9px 20px;border-radius:50px;font-size:.85rem;font-weight:700;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;z-index:9999;white-space:nowrap}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .empty-state{grid-column:1/-1;text-align:center;padding:44px 20px;color:#aaa}
  .empty-state .icon{font-size:2.8rem;margin-bottom:10px}

  /* Loading skeleton */
  .skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:18px;aspect-ratio:1/1}
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

  @media(max-width:480px){
    .products-grid{grid-template-columns:repeat(2,1fr);gap:12px}
    .price-main{font-size:1.7rem}
    .cat-picker{grid-template-columns:repeat(4,1fr)}
    .drawer-items{padding:8px 14px}
    .drawer-header,.drawer-name-row,.drawer-footer{padding-left:16px;padding-right:16px}
  }
</style>
</head>
<body data-theme="hortifruti">

<header>
